name: Build Advanced Chat Tabs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build with Java 21
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew clean build --stacktrace --no-daemon

      - name: Upload built mod
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: advanced-chat-tabs-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
